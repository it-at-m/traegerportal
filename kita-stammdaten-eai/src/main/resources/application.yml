spring:
  application:
    name: "@project.artifactId@"
    group: "@project.groupId@"
    version: "@project.version@"
  main:
    web-application-type: reactive
    banner-mode: console
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origins:
                - https://stadt-i.muenchen.de
                allowed-methods:
                - GET,POST,OPTIONS
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://sso.muenchen.de/auth/realms/public
          jwk-set-uri: https://sso.muenchen.de/auth/realms/public/protocol/openid-connect/certs

adapter:
  einrichtungsverwaltung:
    base-url: https://kita-einrichtung.muenchen.de/
    base-path: /api/einrichtungsverwaltung-backend/external/traeger/by-unternehmenskontoid/(ukId)
    security:
      token-url: https://sso.muenchen.de/auth/realms/muenchen.de/protocol/openid-connect/token
      client-id: rbseinr-traegerportal
      client-secret: client_secret
      scope: LHM_Extended
      cache-seconds: 60
  webcomponents:
    base-url: https://kita-traegerportal-webcomponents-test.muenchen.de/

server:
  error:
    include-message: always
    whitelabel:
      enabled: false

management:
  endpoints:
    access:
      default: none
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
          - sbom
      path-mapping:
        prometheus: metrics
  endpoint:
    health:
      access: read_only
      probes:
        enabled: true
    info:
      access: read_only
    prometheus:
      access: read_only
    sbom:
      access: read_only
  info:
    env:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: info
  structured:
    format:
      console: logstash
    json:
      stacktrace:
        root: first
        # default max size of one log line in docker is 16kb - UTF8 ~ 1 Character = 1 Byte
        # therefore limit stack traces to a maximum of 8192 characters (to leave room for the rest of the message)
        max-length: 8192
      add:
        application_name: ${spring.application.name}
        application_group: ${spring.application.group}

info:
  application:
    name: ${spring.application.name}
    version: ${spring.application.version}
    group: ${spring.application.group}
    description: "@project.description@"
  build:
    java.version: "@java.version@"
    spring-cloud.version: "@spring-cloud-dependencies.version@"

config:
  map5xxto400: true
